      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: topk(25, irate(node_disk_io_time_seconds_total{host=~"$host", device!=""}[$__rate_interval]))
                      legendFormat: "{{host}}: {{device}}"
                    version: v0
                  refId: A
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: avg(irate(node_disk_io_time_seconds_total{host=~"$host", device!=""}[$__rate_interval]))
