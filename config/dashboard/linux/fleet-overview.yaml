                    - color: green
                      value: 0
                    - color: red
                      value: 80
                unit: pps
              overrides: []
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
