    network-traffic:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: >-
                        topk(25, irate(node_network_receive_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8

                        # only show interfaces that had traffic change at least
                        once during selected dashboard interval:

                        and

                        increase(node_network_receive_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__range]) > 0) > 0
                      legendFormat: "{{host}}: {{ device }} received"
                    version: v0
                  refId: A
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: >-
                        topk(25, irate(node_network_transmit_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8

                        # only show interfaces that had traffic change at least
                        once during selected dashboard interval:

                        and

                        increase(node_network_transmit_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__range]) > 0) > 0
                      legendFormat: "{{host}}: {{ device }} transmitted"
                    version: v0
                  refId: B
            queryOptions: {}
            transformations: []
        description: Top 25 interfaces
        id: 7
        links: []
        title: Network traffic
        vizConfig:
          group: timeseries
          kind: VizConfig
          spec:
            fieldConfig:
              defaults:
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: out(-) | in(+)
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
                decimals: 1
                noValue: No traffic
                thresholds:
                  mode: absolute
                  steps:
                    - color: green
                      value: 0
                    - color: red
                      value: 80
                unit: bps
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
    network-errors:
      kind: Panel
      spec:
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: topk(25, irate(node_network_transmit_errs_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} errors transmitted"
                    version: v0
                  refId: A
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: topk(25, irate(node_network_receive_errs_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} errors received"
                    version: v0
                  refId: B
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: topk(25, irate(node_network_transmit_drop_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} transmitted dropped"
                    version: v0
                  refId: C
              - kind: PanelQuery
                spec:
                  hidden: false
                  query:
                    datasource: *datasource
                    group: prometheus
                    kind: DataQuery
                    spec:
                      expr: topk(25, irate(node_network_receive_drop_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} received dropped"
                    version: v0
                  refId: D
            queryOptions: {}
            transformations: []
        description: >
          Top 25.


          **Network errors**:


          Network errors refer to issues that occur during the transmission of
          data across a network. 


          These errors can result from various factors, including physical
          issues, jitter, collisions, noise and interference.


          Monitoring network errors is essential for diagnosing and resolving
          issues, as they can indicate problems with network hardware or
          environmental factors affecting network quality.


          **Dropped packets**:


          Dropped packets occur when data packets traveling through a network
          are intentionally discarded or lost due to congestion, resource
          limitations, or network configuration issues. 


          Common causes include network congestion, buffer overflows, QoS
          settings, and network errors, as corrupted or incomplete packets may
          be discarded by receiving devices.


          Dropped packets can impact network performance and lead to issues such
          as degraded voice or video quality in real-time applications.
        id: 8
        links: []
        title: Network errors and dropped packets
