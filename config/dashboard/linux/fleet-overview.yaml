                    kind: DataQuery
                    spec:
                      expr: >-
                        topk(25, 100 -
                        (
                          avg by (host) (node_memory_memavailable_bytes{host=~"$host"}) /
                          avg by (host) (node_memory_memtotal_bytes{host=~"$host"})
