docker:
  images:
    build:
      balite:
        context:
          location: image/balite
          base: python-alpine
          python-builder:
            image: python-builder
        version: "0.1.7"
  volumes:
    local:
      balite-data:
        backup: false
services:
  balite:
    config:
      hatchet:
        docker:
          models:
            - null
    network:
      bridge:
    container:
      active: false
      image:
        build: balite
      tmpfs:
        - /tmp
      volumes:
        balite-data: /data
