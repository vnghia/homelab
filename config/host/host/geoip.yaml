docker:
  images:
    remote:
      geoip-updater:
        repo: ghcr.io/crazy-max/geoip-updater
        tag: "1.13.0"
  volumes:
    local:
      geoip-download: {}
      geoip-data: {}
services:
  geoip:
    variables:
      LICENSE_KEY:
    config:
      hatchet:
        task:
          task:
            schedules:
              - "0 0 * * *"
            docker:
              run: {}
    network:
      bridge: {}
    container:
      oneshot: true
      image: geoip-updater
      command:
        - --license-key
        - svariable: LICENSE_KEY
      network:
        bridge:
          vpn: {}
      volumes:
        geoip-download: /download
        geoip-data: /.geoip-updater
      envs:
        EDITION_IDS: GeoLite2-City,GeoLite2-Country,GeoLite2-ASN
        DOWNLOAD_PATH:
          volume: geoip-download
        LOG_LEVEL: info
        LOG_JSON: true
