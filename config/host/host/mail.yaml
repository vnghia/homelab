docker:
  images:
    remote:
      stalwart:
        repo: stalwartlabs/stalwart
        tag: "v0.16.0"
  volumes:
    local:
      mail-stalwart-config:
        backup: false
      mail-stalwart-data: {}
services:
  kanidm:
    config:
      state:
        systems:
          oauth2:
            mail:
              display-name: Mail
              origin-url:
                - hostname: mail
                  record: solar
                  scheme: https
              origin-landing:
                hostname: mail
                record: solar
                scheme: https
              prefer-short-username: true
  mail:
    variables:
      STALWART_CONFIG_PATH:
        extract:
          volume: mail-stalwart-config
        transform:
          path: config.json
      MAIL_OAUTH_URL:
        extract:
          record: solar
          hostname: kanidm
          scheme: https
        transform:
          string:
            template: "{value}/oauth2/openid/mail"
    config:
      stalwart:
        recovery:
          enabled: true
          port: 12908
          username:
            keepass: admin
            info: username
          password:
            keepass: admin
            info: password
    keepasses:
      admin:
        username: admin
        hostname:
          record: solar
          hostname: mail
    files:
      stalwart-config:
        path:
          svariable: STALWART_CONFIG_PATH
        content:
          format: json
          data:
            "@type": "RocksDb"
            path:
              extract:
                volume: mail-stalwart-data
              transform:
                path: rocksdb
    container:
      delete-before-replace: true
      image: stalwart
      cap:
        add:
          - NET_BIND_SERVICE
      command:
        - "-c"
        - svariable: STALWART_CONFIG_PATH
      healthcheck: {}
      hosts:
        - record: solar
          hostname: kanidm
      network:
        bridge:
          direct: {}
      tmpfs:
        - /tmp
      volumes:
        mail-stalwart-config:
          path: /etc/stalwart
          read-only: true
        mail-stalwart-data: /var/lib/stalwart
