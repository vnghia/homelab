docker:
  images:
    remote:
      stalwart:
        repo: stalwartlabs/stalwart
        tag: "v0.16.10"
  volumes:
    local:
      mail-stalwart-config:
        backup: false
      mail-stalwart-data: {}
services:
  kanidm:
    config:
      state:
        systems:
          oauth2:
            mail:
              display-name: Mail
              public: true
              origin-url:
                - hostname: mail
                  record: solar
                  scheme: https
                - hostname: mail
                  record: sun
                  scheme: https
              origin-landing:
                hostname: mail
                record: solar
                scheme: https
              prefer-short-username: true
  mail:
    variables:
      STALWART_CONFIG_PATH:
        extract:
          volume: mail-stalwart-config
        transform:
          path: config.json
      STALWART_HTTP_PORT: 12908
      STALWART_SMTPS_PORT: 466
      MAIL_OIDC_URL:
        extract:
          record: solar
          hostname: kanidm
          scheme: https
        transform:
          string:
            template: "{value}/oauth2/openid/mail"
    config:
      stalwart:
        recovery:
          enabled: false
          admin: true
          address:
            hinfo: address
          username:
            keepass: stalwart-recovery-admin
            info: username
          password:
            keepass: stalwart-recovery-admin
            info: password
        system:
          record: sun
          hostname: mail
          proxies:
            network: mail
            info: subnet
        listener:
          http:
            port:
              svariable: STALWART_HTTP_PORT
            protocol: http
          smtp:
            port:
              gvariable: MAIL_SMTP_PORT
            protocol: smtp
          smtps:
            port:
              svariable: STALWART_SMTPS_PORT
            protocol: smtp
      traefik:
        dynamic:
          http:
            name: http
            service:
              port:
                svariable: STALWART_HTTP_PORT
          smtp:
            name: smtp
            hostsni:
            entrypoint: smtp
            proxy-protocol:
              enabled: true
            tls:
              enabled: false
            service:
              port:
                gvariable: MAIL_SMTP_PORT
          smtps:
            name: smtps
            hostsni:
            entrypoint: smtps
            proxy-protocol:
              enabled: true
            tls:
              passthrough: false
            service:
              port:
                svariable: STALWART_SMTPS_PORT
    keepasses:
      stalwart-recovery-admin:
        username:
          force-lower: true
        hostname:
          hostname: mail
    files:
      stalwart-config:
        path:
          svariable: STALWART_CONFIG_PATH
        content:
          format: json
          data:
            "@type": "RocksDb"
            path:
              extract:
                volume: mail-stalwart-data
              transform:
                path: rocksdb
    container:
      delete-before-replace: true
      image: stalwart
      cap:
        add:
          - NET_BIND_SERVICE
      command:
        - "-c"
        - svariable: STALWART_CONFIG_PATH
      healthcheck: {}
      hosts:
        - record: solar
          hostname: kanidm
      network:
        bridge:
          vpn: {}
      tmpfs:
        - /tmp
      volumes:
        mail-stalwart-config:
          path: /etc/stalwart
          read-only: true
        mail-stalwart-data: /var/lib/stalwart
      envs:
        STALWART_RECOVERY_MODE_LOG_LEVEL: debug
        STALWART_HEALTHCHECK_URL:
          extract:
            svariable: STALWART_HTTP_PORT
          transform:
            string:
              template: "http://localhost:{value}/healthz/live"
