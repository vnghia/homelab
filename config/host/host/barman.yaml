docker:
  images:
    build:
      barman:
        context:
          location: image/barman
          base: alpine
        args:
          BARMAN_VERSION: &barman-version "3.19.0-r0"
        version: *barman-version
  database:
    postgres:
      backup: {}
      container:
        network:
          bridge:
            barman: {}
  volumes:
    local:
      barman-home:
        backup: false
      barman-config:
        backup: false
services:
  barman:
    config:
      config-dir:
        volume: barman-config
      staging-dir:
        extract:
          volume: barman-home
        transform:
          path: staging
      minimum-redundancy: 3
      last-backup-maximum-age: 3 DAYS
      retention-policy: RECOVERY WINDOW OF 3 DAYS
      backup-compression: zstd
      compression: zstd
      hatchet:
        docker:
          names:
            - null
        scheduler:
          check:
            workflow: barman-check
            schedules:
              - "0 5 * * mon" # 5am every monday
              - "0 5 * * thu" # 5am every thursday
            input:
              profiles: all
    container:
      delete-before-replace: true
      image:
        build: barman
      command: ["infinity"]
      entrypoint: ["sleep"]
      init: true
      tmpfs:
        - /tmp
        - /var/run
      volumes:
        barman-config:
          path: /etc/barman.d
          read-only: true
        barman-home: /var/lib/barman
