docker:
  images:
    remote:
      pdf:
        repo: ghcr.io/alam00000/bentopdf-simple
        tag: "2.8.3"
services:
  pdf:
    variables:
      PORT: 8080
    config:
      traefik:
        dynamic:
          traefik:
            record: solar
            service:
              port:
                svariable: PORT
    user:
      # nginx user
      uid: 101
      gid: 101
    container:
      image: pdf
      healthcheck:
        tests:
          - "CMD"
          - "wget"
          - "--spider"
          - "-q"
          - extract:
              svariable: PORT
            transform:
              string:
                template: "http://localhost:{value}"
      tmpfs:
        - /var/lib/nginx/tmp
        - /var/cache/nginx
        - /etc/nginx/tmp
      wud:
        template: https://github.com/alam00000/bentopdf/releases/tag/${original}
        include-prefix: v
