docker:
  images:
    remote:
      radarr:
        repo: ghcr.io/linuxserver/radarr
        tag: "version-6.0.4.10291"
      sonarr:
        repo: ghcr.io/linuxserver/sonarr
        tag: "version-4.0.16.2944"
      prowlarr:
        repo: ghcr.io/linuxserver/prowlarr
        tag: "version-2.3.0.5236"
      bazarr:
        repo: ghcr.io/linuxserver/bazarr
        tag: "1.6.0"
  volumes:
    local:
      starr-data:
        backup:
          repository: iso
      starr-radarr-config:
        backup:
          sqlite:
            dbs:
              - logs.db
              - radarr.db
      starr-sonarr-config:
        backup:
          sqlite:
            dbs:
              - logs.db
              - sonarr.db
      starr-prowlarr-config:
        backup:
          sqlite:
            dbs:
              - logs.db
              - prowlarr.db
      starr-bazarr-config:
        backup:
          sqlite:
            dbs:
              - db/bazarr.db
services:
  starr:
    config:
      traefik:
        dynamic:
          radarr:
            name: radarr
            service:
              container: radarr
              port:
                svariable: RADARR_PORT
          sonarr:
            name: sonarr
            service:
              container: sonarr
              port:
                svariable: SONARR_PORT
          prowlarr:
            name: prowlarr
            service:
              container: prowlarr
              port:
                svariable: PROWLARR_PORT
          bazarr:
            name: bazarr
            service:
              container: bazarr
              port:
                svariable: BAZARR_PORT
    keepasses:
      radarr:
        hostname:
          hostname: starr-radarr
      sonarr:
        hostname:
          hostname: starr-sonarr
      prowlarr:
        hostname:
          hostname: starr-prowlarr
      bazarr:
        hostname:
          hostname: starr-bazarr
    network:
      bridge:
        egress:
          https:
            earth:
              host: earth
              hostnames:
                - record: earth
                  hostname: bitmagnet
    variables:
      RADARR_PORT: 7878
      SONARR_PORT: 8989
      PROWLARR_PORT: 9696
      BAZARR_PORT: 6767
    containers:
      radarr:
        image: radarr
        hosts:
          - hostname: qbittorrent
        network:
          bridge:
            vpn: {}
        tmpfs:
          - path: /run
            exec: true
        volumes:
          starr-data: /starr
          starr-radarr-config: /config
        envs:
          S6_READ_ONLY_ROOT: 1
      sonarr:
        image: sonarr
        hosts:
          - hostname: qbittorrent
        network:
          bridge:
            vpn: {}
        tmpfs:
          - path: /run
            exec: true
        volumes:
          starr-data: /starr
          starr-sonarr-config: /config
        envs:
          S6_READ_ONLY_ROOT: 1
      prowlarr:
        image: prowlarr
        hosts:
          - hostname: qbittorrent
        network:
          bridge:
            vpn: {}
            flaresolverr: {}
        tmpfs:
          - path: /run
            exec: true
        volumes:
          starr-prowlarr-config: /config
        envs:
          S6_READ_ONLY_ROOT: 1
      bazarr:
        image: bazarr
        network:
          bridge:
            vpn: {}
        tmpfs:
          - path: /run
            exec: true
          - /tmp
        volumes:
          starr-data: /starr
          starr-bazarr-config: /config
        envs:
          S6_READ_ONLY_ROOT: 1
