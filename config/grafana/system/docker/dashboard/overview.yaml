apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    container-count:
      kind: Panel
      spec:
        id: 1
        title: Containers
        description: Total number of running containers last seen by the exporter.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: count(container_last_seen{host="$host", name!=""})
                      format: time_series
                      instant: false
                      legendFormat: "{{host}}: Containers"
                  refId: Containers
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                color:
                  mode: fixed
                  fixedColor: text
              overrides: []
    image-count:
      kind: Panel
      spec:
        id: 2
        title: Images
        description: Total number of distinct images found across running containers.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: count (sum by (image) (container_last_seen{host="$host", name!=""}))
                      format: time_series
                      instant: false
                      legendFormat: "{{host}}: Images"
                  refId: Images
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                color:
                  mode: fixed
                  fixedColor: text
              overrides: []
    total-cpu-usage:
      kind: Panel
      spec:
        id: 3
        title: CPU usage
        description: |
          Total CPU utilization percent is a metric that indicates the overall level of central processing unit (CPU) usage in a computer system.
          It represents the combined load placed on all CPU cores or processors.

          For instance, if the total CPU utilization percent is 50%, it means that,
          on average, half of the CPU's processing capacity is being used to execute tasks. A higher percentage indicates that the CPU is working more intensively, potentially leading to system slowdowns if it remains consistently high.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        avg by (name) (rate(container_cpu_usage_seconds_total{host="$host", name!=""}[$__rate_interval])) * 100
                        / on() group_left()
                        count (node_cpu_frequency_max_hertz{host="$host"})
                      format: time_series
                      instant: false
                      legendFormat: "{{host}}"
                  refId: CPU usage
                  hidden: false
            transformations:
              - kind: Transformation
                group: calculateField
                spec:
                  options:
                    mode: reduceRow
                    reduce:
                      reducer: sum
                    replaceFields: true
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                color:
                  mode: continuous-BlYlRd
                  fixedColor: text
              overrides: []
    total-memory-reserved:
      kind: Panel
      spec:
        id: 4
        title: Memory reserved
        description: Memory reserved by the containers on the machine.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        (sum (container_spec_memory_reservation_limit_bytes{host="$host", name!=""})
                        /
                        sum (node_memory_memtotal_bytes{host="$host"})) * 100
                      format: time_series
                      instant: false
                      legendFormat: "{{host}}: Memory reserved"
                  refId: Memory reserved
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                color:
                  mode: continuous-BlYlRd
                  fixedColor: text
              overrides: []
    total-memory-usage:
      kind: Panel
      spec:
        id: 5
        title: Memory used
        description: Memory used by all containers out of machine total.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        (sum (container_memory_working_set_bytes{host="$host", name!=""})
                        /
                        sum (node_memory_memtotal_bytes{host="$host"})) * 100
                      format: time_series
                      instant: false
                      legendFormat: "{{host}}: Memory used"
                  refId: Memory used
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                color:
                  mode: continuous-BlYlRd
                  fixedColor: text
              overrides: []
    cpu-by-container:
      kind: Panel
      spec:
        id: 6
        title: CPU usage
        description: CPU time consumed in seconds by container.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        rate(container_cpu_usage_seconds_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name"}[$__rate_interval]) * 100
                        / on() group_left()
                        count (node_cpu_frequency_max_hertz{host="$host"})
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}"
                  refId: CPU usage
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                min: 0
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  axisSoftMax: 100
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
              overrides:
                - matcher:
                    id: byFrameRefID
                    options: CPU usage
                  properties:
                    - id: unit
                      value: percent
    memory-by-container:
      kind: Panel
      spec:
        id: 7
        title: Memory usage
        description: "Current memory usage in bytes, including all memory regardless of when it was accessed by container."
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: container_memory_working_set_bytes{host="$host", service=~"$service", alias=~"$alias", name=~"$name"}
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}"
                  refId: Memory usage
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
              overrides: []
    network-by-container:
      kind: Panel
      spec:
        id: 8
        title: Network traffic
        description: Network traffic (bytes per sec) measures data transmitted and received.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_receive_bytes_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval])
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} receive"
                  refId: received
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_transmit_bytes_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval])
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} transmit"
                  refId: transmitted
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: binBps
                decimals: 1
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: out(-) | in(+)
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    network-error-by-container:
      kind: Panel
      spec:
        id: 9
        title: Network errors and drops
        description: |
          Network errors refer to issues that occur during the transmission of data across a network. 

          These errors can result from various factors, including physical issues, jitter, collisions, noise and interference.

          Monitoring network errors is essential for diagnosing and resolving issues, as they can indicate problems with network hardware or environmental factors affecting network quality.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_receive_packets_dropped_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval]) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} rx drops"
                  refId: drops received
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_transmit_packets_dropped_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval]) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} tx drops"
                  refId: drops transmitted
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_receive_errors_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval]) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} rx errors"
                  refId: errors received
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_network_transmit_errors_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name", network_mode="bridge"}[$__rate_interval]) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{interface}} tx errors"
                  refId: errors transmitted
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                color:
                  mode: palette-classic
                noValue: No errors
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
              overrides:
                - matcher:
                    id: byFrameRefID
                    options: drops received
                  properties:
                    - id: unit
                      value: pps
                - matcher:
                    id: byFrameRefID
                    options: drops transmitted
                  properties:
                    - id: unit
                      value: pps
                - matcher:
                    id: byFrameRefID
                    options: errors received
                  properties:
                    - id: unit
                      value: pps
                - matcher:
                    id: byFrameRefID
                    options: errors transmitted
                  properties:
                    - id: unit
                      value: pps
    disk-usage-by-container:
      kind: Panel
      spec:
        id: 10
        title: Disk usage
        description: |
          Disk space usage is the amount of storage being used on a device's hard drive or storage medium, in bytes.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: container_fs_usage_bytes{host="$host", service=~"$service", alias=~"$alias", name=~"$name"}
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{device}}"
                  refId: Disk space usage
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 1
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
              overrides: []
    disk-io-by-container:
      kind: Panel
      spec:
        id: 11
        title: Disk I/O
        description: The number of I/O requests per second for the device/volume.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_fs_reads_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name"}[$__rate_interval])
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{device}} read"
                  refId: Disk reads
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: rate(container_fs_writes_total{host="$host", service=~"$service", alias=~"$alias", name=~"$name"}[$__rate_interval])
                      format: time_series
                      instant: false
                      legendFormat: "{{name}}/{{device}} write"
                  refId: Disk writes
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                displayMode: table
                placement: bottom
                showLegend: true
                sortBy: Mean
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: iops
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: write(-) | read(+)
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 1
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
              overrides:
                - matcher:
                    id: byRegexp
                    options: /write|written/
                  properties:
                    - id: custom.transform
                      value: negative-Y
                - matcher:
                    id: byFrameRefID
                    options: Disk reads
                  properties:
                    - id: unit
                      value: reqps
                - matcher:
                    id: byFrameRefID
                    options: Disk writes
                  properties:
                    - id: unit
                      value: reqps
  layout:
    kind: RowsLayout
    spec:
      rows:
        - kind: RowsLayoutRow
          spec:
            title: Overview
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 4
                      height: 4
                      element:
                        kind: ElementReference
                        name: container-count
                  - kind: GridLayoutItem
                    spec:
                      x: 4
                      y: 0
                      width: 4
                      height: 4
                      element:
                        kind: ElementReference
                        name: image-count
                  - kind: GridLayoutItem
                    spec:
                      x: 8
                      y: 0
                      width: 4
                      height: 4
                      element:
                        kind: ElementReference
                        name: total-cpu-usage
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 0
                      width: 4
                      height: 4
                      element:
                        kind: ElementReference
                        name: total-memory-reserved
                  - kind: GridLayoutItem
                    spec:
                      x: 16
                      y: 0
                      width: 4
                      height: 4
                      element:
                        kind: ElementReference
                        name: total-memory-usage
        - kind: RowsLayoutRow
          spec:
            title: Compute
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 12
                      height: 10
                      element:
                        kind: ElementReference
                        name: cpu-by-container
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 0
                      width: 12
                      height: 10
                      element:
                        kind: ElementReference
                        name: memory-by-container
        - kind: RowsLayoutRow
          spec:
            title: Network
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 12
                      height: 10
                      element:
                        kind: ElementReference
                        name: network-by-container
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 0
                      width: 12
                      height: 10
                      element:
                        kind: ElementReference
                        name: network-error-by-container
        - kind: RowsLayoutRow
          spec:
            title: Storage
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 12
                      height: 10
                      element:
                        kind: ElementReference
                        name: disk-usage-by-container
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 0
                      width: 12
                      height: 10
