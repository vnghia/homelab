apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    overview:
      kind: Panel
      spec:
        id: 1
        title: Fleet overview
        description: All nodes' perfomance at a glance.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_uname_info * on (host) group_left(pretty_name) node_os_info
                      format: table
                      instant: true
                  refId: OS Info
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: time() - node_boot_time_seconds
                      format: table
                      instant: true
                  refId: Uptime
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_load1
                      format: table
                      instant: true
                      legendFormat: 1m
                  refId: Load 1
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: count without (cpu) (node_cpu_seconds_total{mode="idle"})
                      format: table
                      instant: true
                      legendFormat: Cores
                  refId: Cores
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        (((count by (host) (count(node_cpu_seconds_total) by (cpu, host)))
                        -
                        sum by (host) (sum by (host,
                        mode)(irate(node_cpu_seconds_total{mode=~"idle|iowait|steal"}[$__rate_interval]))))
                        * 100)
                        /
                        count by(host)
                        (count(node_cpu_seconds_total)
                        by (cpu, host))
                      format: table
                      instant: true
                      legendFormat: CPU usage
                  refId: CPU usage
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_memtotal_bytes
                      format: table
                      instant: true
                      legendFormat: Memory total
                  refId: Memory total
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: 100 - (avg by (host) (node_memory_memavailable_bytes) / avg by (host) (node_memory_memtotal_bytes) * 100)
                      format: table
                      instant: true
                  refId: Memory usage
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_filesystem_size_bytes{mountpoint="/", fstype!="rootfs"}
                      format: table
                      instant: true
                  refId: Root mount size
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: 100 - node_filesystem_avail_bytes{mountpoint="/", fstype!="rootfs"} / node_filesystem_size_bytes{mountpoint="/", fstype!="rootfs"} * 100
                      format: table
                      instant: true
                  refId: Root mount used
                  hidden: false
            transformations:
              - kind: Transformation
                group: joinByField
                spec:
                  options:
                    byField: host
                    mode: outer
              - kind: Transformation
                group: filterFieldsByName
                spec:
                  options:
                    include:
                      pattern: host|host 1|product|^hostname$|^nodename$|^pretty_name$|Value.+
              - kind: Transformation
                group: organize
                spec:
                  options:
                    excludeByName:
                      "Value #OS Info": true
                    indexByName:
                      host: 0
                      hostname: 1
                      nodename: 1
                      pretty_name: 2
                      product: 2
                    renameByName:
                      host: Host
                      host 1: Host
                      hostname: Hostname
                      nodename: Hostname
                      pretty_name: OS
                      product: OS
              - kind: Transformation
                group: renameByRegex
                spec:
                  options:
                    regex: "Value #(.*)"
                    renamePattern: $1
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: table
          version: ""
          spec:
            options:
              cellHeight: sm
              showHeader: true
            fieldConfig:
              defaults:
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                custom:
                  align: auto
                  cellOptions:
                    type: auto
                  footer:
                    reducers: []
                  inspect: false
              overrides:
                - matcher:
                    id: byName
                    options: Uptime
                  properties:
                    - id: custom.cellOptions
                      value:
                        type: color-text
                    - id: color
                      value:
                        mode: thresholds
                    - id: decimals
                      value: 1
                    - id: thresholds
                      value:
                        mode: absolute
                        steps:
                          - color: orange
                            value: 0
                          - color: text
                            value: 600
                    - id: unit
                      value: dtdurations
                - matcher:
                    id: byRegexp
                    options: Product|^Hostname$
                  properties:
                    - id: custom.filterable
                      value: true
                - matcher:
                    id: byName
                    options: Host
                  properties:
                    - id: custom.filterable
                      value: true
                    - id: links
                      value:
                        - targetBlank: false
                          title: "Drill down to ${__field.name} ${__value.text}"
                          url: "/d/system-linux-node-overview?${__url_time_range}&var-host=${__data.fields.host}"
                - matcher:
                    id: byName
                    options: Cores
                  properties:
                    - id: custom.width
                      value: 120
                - matcher:
                    id: byName
                    options: CPU usage
                  properties:
                    - id: custom.width
                      value: 120
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                        valueDisplayMode: text
                    - id: color
                      value:
                        mode: continuous-BlYlRd
                    - id: decimals
                      value: 1
                    - id: max
                      value: 100
                    - id: min
                      value: 0
                    - id: unit
                      value: percent
                - matcher:
                    id: byName
                    options: Memory total
                  properties:
                    - id: custom.width
                      value: 120
                    - id: unit
                      value: bytes
                - matcher:
                    id: byName
                    options: Memory usage
                  properties:
                    - id: custom.width
                      value: 120
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                        valueDisplayMode: text
                    - id: color
                      value:
                        mode: continuous-BlYlRd
                    - id: decimals
                      value: 1
                    - id: max
                      value: 100
                    - id: min
                      value: 0
                    - id: unit
                      value: percent
                - matcher:
                    id: byName
                    options: Root mount size
                  properties:
                    - id: custom.width
                      value: 120
                    - id: unit
                      value: bytes
                - matcher:
                    id: byName
                    options: Root mount used
                  properties:
                    - id: custom.width
                      value: 120
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                        valueDisplayMode: text
                    - id: unit
                      value: percent
                    - id: color
                      value:
                        mode: continuous-BlYlRd
                    - id: decimals
                      value: 1
                    - id: max
                      value: 100
                    - id: min
                      value: 0
                    - id: unit
                      value: percent
                - matcher:
                    id: byNames
                    options:
                      mode: include
                      names:
                        - "Value #Cores"
                        - "Value #Load 1"
                        - "Value #Memory total"
                        - "Value #Root mount size"
                  properties:
                    - id: custom.footer.reducers
                      value:
                        - sum
    cpu-usage:
      kind: Panel
      spec:
        id: 2
        title: CPU usage
        description: Top 25
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        topk(25, (((count by (host) (count(node_cpu_seconds_total{host=~"$host"}) by (cpu, host)))
                        -
                        sum by (host) (sum by (host, mode) (irate(node_cpu_seconds_total{host=~"$host", mode=~"idle|iowait|steal"}[$__rate_interval])))) * 100)
                        /
                        (count by (host) (count(node_cpu_seconds_total{host=~"$host"}) by (cpu, host))))
                      legendFormat: "{{host}}"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        avg((((count by (host) (count(node_cpu_seconds_total{host=~"$host"}) by (cpu, host)))
                        -
                        sum by (host) (sum by (host, mode) (irate(node_cpu_seconds_total{host=~"$host", mode=~"idle|iowait|steal"}[$__rate_interval])))) * 100)
                        /
                        count by (host) (count(node_cpu_seconds_total{host=~"$host"}) by (cpu, host)))
                      legendFormat: Mean
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: continuous-BlYlRd
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 1
                  gradientMode: scheme
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byName
                    options: Mean
                  properties:
                    - id: color
                      value:
                        fixedColor: light-purple
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    load-average:
