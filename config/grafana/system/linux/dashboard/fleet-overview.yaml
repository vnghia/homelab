    network-traffic:
      kind: Panel
      spec:
        id: 7
        title: Network traffic
        description: Top 25 interfaces
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        topk(25, irate(node_network_receive_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                        # only show interfaces that had traffic change at least once during selected dashboard interval:
                        and
                        increase(node_network_receive_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__range]) > 0) > 0
                      legendFormat: "{{host}}: {{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        topk(25, irate(node_network_transmit_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                        # only show interfaces that had traffic change at least once during selected dashboard interval:
                        and
                        increase(node_network_transmit_bytes_total{host=~"$host", device!~"^(br-|veth).+$"}[$__range]) > 0) > 0
                      legendFormat: "{{host}}: {{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bps
                decimals: 1
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                noValue: No traffic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: out(-) | in(+)
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    network-errors:
      kind: Panel
      spec:
        id: 8
        title: Network errors and dropped packets
        description: |
          Top 25.

          **Network errors**:

          Network errors refer to issues that occur during the transmission of data across a network. 

          These errors can result from various factors, including physical issues, jitter, collisions, noise and interference.

          Monitoring network errors is essential for diagnosing and resolving issues, as they can indicate problems with network hardware or environmental factors affecting network quality.

          **Dropped packets**:

          Dropped packets occur when data packets traveling through a network are intentionally discarded or lost due to congestion, resource limitations, or network configuration issues. 

          Common causes include network congestion, buffer overflows, QoS settings, and network errors, as corrupted or incomplete packets may be discarded by receiving devices.

          Dropped packets can impact network performance and lead to issues such as degraded voice or video quality in real-time applications.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: topk(25, irate(node_network_transmit_errs_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} errors transmitted"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: topk(25, irate(node_network_receive_errs_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} errors received"
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: topk(25, irate(node_network_transmit_drop_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} transmitted dropped"
                  refId: C
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: topk(25, irate(node_network_receive_drop_total{host=~"$host", device!~"^(br-|veth).+$"}[$__rate_interval])) > 0
                      legendFormat: "{{host}}: {{ device }} received dropped"
                  refId: D
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - lastNotNull
                displayMode: table
                placement: right
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                noValue: No errors
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: points
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []

