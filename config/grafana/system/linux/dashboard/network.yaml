apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    network-interfaces-overview:
      kind: Panel
      spec:
        id: 1
        title: Network interfaces overview
        description: Network interfaces overview.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_up{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                      legendFormat: "{{device}}"
                  refId: Up
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_carrier{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                      legendFormat: "{{device}}"
                  refId: Carrier
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                      format: table
                      instant: false
                      legendFormat: "{{ device }} transmitted"
                  refId: Transmitted
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                      format: table
                      instant: false
                      legendFormat: "{{ device }} received"
                  refId: Received
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_arp_entries{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                  refId: ARP entries
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_mtu_bytes{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                  refId: MTU
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_speed_bytes{host="$host", device!~"^(br-|veth).+$"} * 8
                      format: table
                      instant: true
                  refId: Speed
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_transmit_queue_length{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                  refId: Queue length
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_info{host="$host", device!~"^(br-|veth).+$"}
                      format: table
                      instant: true
                  refId: Info
                  hidden: false
            transformations:
              - kind: Transformation
                group: joinByField
                spec:
                  options:
                    byField: device
                    mode: outer
              - kind: Transformation
                group: filterFieldsByName
                spec:
                  options:
                    include:
                      pattern: device|duplex|address|Value.+
              - kind: Transformation
                group: renameByRegex
                spec:
                  options:
                    regex: "(Value) #(.*)"
                    renamePattern: $2
              - kind: Transformation
                group: organize
                spec:
                  options:
                    excludeByName:
                      Info: true
                    renameByName:
                      address: Address
                      device: Interface
                      duplex: Duplex
              - kind: Transformation
                group: organize
                spec:
                  options:
                    indexByName:
                      Carrier: 2
                      Interface: 0
                      Received: 3
                      Transmitted: 4
                      Up: 1
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: table
          version: ""
          spec:
            options: {}
            fieldConfig:
              defaults: {}
              overrides:
                - matcher:
                    id: byName
                    options: Interface
                  properties:
                    - id: custom.filterable
                      value: true
                - matcher:
                    id: byName
                    options: Speed
                  properties:
                    - id: unit
                      value: bps
                - matcher:
                    id: byRegexp
                    options: Transmitted|Received
                  properties:
                    - id: custom.cellOptions
                      value:
                        mode: gradient
                        type: gauge
                        valueDisplayMode: text
                    - id: color
                      value:
                        mode: continuous-BlYlRd
                    - id: max
                      value: 100000000
                    - id: unit
                      value: bps
                - matcher:
                    id: byRegexp
                    options: Carrier|Up
                  properties:
                    - id: custom.cellOptions
                      value:
                        type: color-text
                    - id: mappings
                      value:
                        - options:
                            "0":
                              color: light-red
                              index: 0
                              text: Down
                            "1":
                              color: light-green
                              index: 1
                              text: Up
                          type: value
    network-traffic:
      kind: Panel
      spec:
        id: 2
        title: Network traffic
        description: Network traffic (bits per sec) measures data transmitted and received.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        irate(node_network_receive_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                        # only show interfaces that had traffic change at least once during selected dashboard interval:
                        and
                        increase(node_network_receive_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__range]) > 0
                      legendFormat: "{{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        irate(node_network_transmit_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval]) * 8
                        # only show interfaces that had traffic change at least once during selected dashboard interval:
                        and
                        increase(node_network_transmit_bytes_total{host="$host", device!~"^(br-|veth).+$"}[$__range]) > 0
                      legendFormat: "{{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bps
                decimals: 1
                noValue: No traffic
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    network-interfaces-carrier-status:
      kind: Panel
      spec:
        id: 3
        title: Network interfaces carrier status
        description: Network interfaces carrier status
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_network_carrier{host="$host", device!~"^(br-|veth).+$"}
                      legendFormat: "{{device}}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions:
              maxDataPoints: 50
        vizConfig:
          kind: VizConfig
          group: status-history
          version: ""
          spec:
            options:
              showValue: never
            fieldConfig:
              defaults:
                mappings:
                  - type: value
                    options:
                      "0":
                        text: Down
                        color: light-red
                        index: 0
                      "1":
                        text: Up
                        color: light-green
                        index: 1
                color:
                  mode: fixed
              overrides: []
    network-errors:
      kind: Panel
      spec:
        id: 4
        title: Network errors
        description: |
          Network errors refer to issues that occur during the transmission of data across a network. 
          These errors can result from various factors, including physical issues, jitter, collisions, noise and interference.
          Monitoring network errors is essential for diagnosing and resolving issues, as they can indicate problems with network hardware or environmental factors affecting network quality.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_errs_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} errors received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_errs_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} errors transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No errors
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    dropped-packets:
      kind: Panel
      spec:
        id: 5
        title: Dropped packets
        description: |
          Dropped packets occur when data packets traveling through a network are intentionally discarded or lost due to congestion, resource limitations, or network configuration issues. 
          Common causes include network congestion, buffer overflows, QoS settings, and network errors, as corrupted or incomplete packets may be discarded by receiving devices.
          Dropped packets can impact network performance and lead to issues such as degraded voice or video quality in real-time applications.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_drop_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} received dropped"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_drop_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} transmitted dropped"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No dropped packets
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    network-packets:
      kind: Panel
      spec:
        id: 6
        title: Network packets
        description: Network packet count tracks the number of data packets transmitted and received over a network connection, providing insight into network activity and performance.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_packets_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_packets_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No packets
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    multicast-packets:
      kind: Panel
      spec:
        id: 7
        title: Multicast packets
        description: Multicast packets received and transmitted.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_multicast_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_multicast_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No multicast packets
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    network-fifo:
      kind: Panel
      spec:
        id: 8
        title: Network FIFO
        description: |
          Network FIFO (First-In, First-Out) refers to a buffer used by the network stack to store packets in a queue.
          It is a mechanism used to manage network traffic and ensure that packets are delivered to their destination in the order they were received.
          Packets are stored in the FIFO buffer until they can be transmitted or processed further.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_fifo_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_fifo_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No packets
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    compressed-packets:
      kind: Panel
      spec:
        id: 9
        title: Compressed packets
        description: |
          - Compressed received: 
          Number of correctly received compressed packets. This counters is only meaningful for interfaces which support packet compression (e.g. CSLIP, PPP).

          - Compressed transmitted:
          Number of transmitted compressed packets. This counters is only meaningful for interfaces which support packet compression (e.g. CSLIP, PPP).

          https://docs.kernel.org/networking/statistics.html
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_receive_compressed_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} received"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_network_transmit_compressed_total{host="$host", device!~"^(br-|veth).+$"}[$__rate_interval])
                      legendFormat: "{{ device }} transmitted"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No packets
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    nf-conntrack:
      kind: Panel
      spec:
        id: 10
        title: NF conntrack
        description: NF Conntrack is a component of the Linux kernel's netfilter framework that provides stateful packet inspection to track and manage network connections, enforce firewall rules, perform NAT, and manage network address/port translation.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_nf_conntrack_entries{host="$host"}
                      legendFormat: NF conntrack entries
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_nf_conntrack_entries_limit{host="$host"}
                      legendFormat: NF conntrack limits
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 0
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides: []
    softnet-packets:
      kind: Panel
      spec:
        id: 11
        title: Softnet packets
        description: |
          Softnet packets are received by the network and queued for processing by the kernel's networking stack.
          Softnet packets are usually generated by network traffic that is directed to the local host, and they are typically processed by the kernel's networking subsystem before being passed on to the relevant application.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_softnet_processed_total{host="$host"}[$__rate_interval])
                      legendFormat: "CPU {{ cpu }} processed"
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_softnet_dropped_total{host="$host"}[$__rate_interval])
                      legendFormat: "CPU {{ cpu }} dropped"
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: pps
                decimals: 1
                noValue: No packets
                custom:
                  axisCenteredZero: false
                  axisLabel: Dropped(-) | Processed(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /dropped/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    softnet-out-of-quota:
      kind: Panel
      spec:
        id: 12
        title: Softnet out of quota
        description: |
          "Softnet out of quota" is a network-related metric in Linux that measures the number of times the kernel's softirq processing was unable to handle incoming network traffic due to insufficient softirq processing capacity.
          This means that the kernel has reached its processing capacity limit for incoming packets, and any additional packets will be dropped or deferred.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_softnet_times_squeezed_total{host="$host"}[$__rate_interval])
                      legendFormat: "CPU {{ cpu }} out of quota"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
