          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_netstat_icmp_inerrors{host="$host"}[$__rate_interval])
                      legendFormat: ICMP errors
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_netstat_icmp6_inerrors{host="$host"}[$__rate_interval])
                      legendFormat: ICMP6 errors
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
