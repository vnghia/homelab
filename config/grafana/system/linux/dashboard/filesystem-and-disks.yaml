apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    filesystem-usage-by-mountpoint:
      kind: Panel
      spec:
        id: 1
        title: Filesystem space availabe
        description: Filesystem space utilisation in bytes, by mountpoint.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_filesystem_avail_bytes{host="$host", fstype!="", mountpoint!=""}
                      legendFormat: "{{ mountpoint }} free"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 1
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    disk-usage-by-mountpoint:
      kind: Panel
      spec:
        id: 2
        title: Disk space usage
        description: Disk utilisation in percent, by mountpoint. Some duplication can occur if the same filesystem is mounted in multiple locations.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_filesystem_size_bytes{host="$host", fstype!="", mountpoint!=""}
                      format: table
                      instant: true
                  refId: TOTAL
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_filesystem_avail_bytes{host="$host", fstype!="", mountpoint!=""}
                      format: table
                      instant: true
                      legendFormat: "{{ mountpoint }} free"
                  refId: FREE
                  hidden: false
            transformations:
              - kind: Transformation
                group: groupBy
                spec:
                  options:
                    fields:
                      "Value #FREE":
                        aggregations:
                          - lastNotNull
                        operation: aggregate
                      "Value #TOTAL":
                        aggregations:
                          - lastNotNull
                        operation: aggregate
                      mountpoint:
                        aggregations: []
                        operation: groupby
              - kind: Transformation
                group: merge
                spec:
                  options: {}
              - kind: Transformation
                group: calculateField
                spec:
                  options:
                    alias: Used
                    binary:
                      left: "Value #TOTAL (lastNotNull)"
                      operator: "-"
                      reducer: sum
                      right: "Value #FREE (lastNotNull)"
                    mode: binary
                    reduce:
                      reducer: sum
              - kind: Transformation
                group: calculateField
                spec:
                  options:
                    alias: "Used, %"
                    binary:
                      left: Used
                      operator: /
                      reducer: sum
                      right: "Value #TOTAL (lastNotNull)"
                    mode: binary
                    reduce:
                      reducer: sum
              - kind: Transformation
                group: organize
                spec:
                  options:
                    excludeByName: {}
                    indexByName:
                      Used: 3
                      "Used, %": 4
                      "Value #FREE (lastNotNull)": 2
                      "Value #TOTAL (lastNotNull)": 1
                      mountpoint: 0
                    renameByName:
                      "Value #FREE (lastNotNull)": Available
                      "Value #TOTAL (lastNotNull)": Size
                      mountpoint: Mounted on
              - kind: Transformation
                group: sortBy
                spec:
                  options:
                    fields: {}
                    sort:
                      - desc: false
                        field: Mounted on
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: table
          version: ""
          spec:
            options:
              cellHeight: sm
              showHeader: true
            fieldConfig:
              defaults:
                unit: bytes
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: light-blue
                    - value: 0.8
                      color: light-yellow
                    - value: 0.9
                      color: light-red
                custom:
                  align: auto
                  cellOptions:
                    type: auto
                  footer:
                    reducers: []
                  inspect: false
              overrides:
                - matcher:
                    id: byName
                    options: Mounted on
                  properties:
                    - id: custom.width
                      value: 260
                - matcher:
                    id: byName
                    options: Size
                  properties:
                    - id: custom.width
                      value: 80
                - matcher:
                    id: byName
                    options: Used
                  properties:
                    - id: custom.width
                      value: 80
                - matcher:
                    id: byName
                    options: Available
                  properties:
                    - id: custom.width
                      value: 80
                - matcher:
                    id: byName
                    options: "Used, %"
                  properties:
                    - id: custom.cellOptions
                      value:
                        mode: basic
                        type: gauge
                        valueDisplayMode: text
                    - id: max
                      value: 1
                    - id: min
                      value: 0
                    - id: unit
                      value: percentunit
