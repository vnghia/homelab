apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    temperature:
      kind: Panel
      spec:
        id: 1
        title: Temperature
        description: Hardware temperature in °C.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        node_hwmon_temp_celsius{host="$host"}
                        * on(chip) group_left(chip_name) node_hwmon_chip_names{host="$host"}
                        * on(chip, sensor) group_left(label) node_hwmon_sensor_label{host="$host"}
                      legendFormat: "{{chip_name}}/{{label}}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: celsius
                custom:
                  lineWidth: 2
              overrides: []
    input-voltage:
      kind: Panel
      spec:
        id: 2
        title: Input voltage
        description: Hardware input voltage.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        node_hwmon_in_volts{host="$host"}
                        * on(chip) group_left(chip_name) node_hwmon_chip_names{host="$host"}
                        * on(chip, sensor) group_left(label) node_hwmon_sensor_label{host="$host"}
                      legendFormat: "{{chip_name}}/{{label}}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: volt
                custom:
                  lineWidth: 2
              overrides: []
    power-consumption:
      kind: Panel
      spec:
        id: 3
        title: Power consumption
        description: Hardware power consumption in watts.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        node_hwmon_power_watt{host="$host"}
                        * on(chip) group_left(chip_name) node_hwmon_chip_names{host="$host"}
                        * on(chip, sensor) group_left(label) node_hwmon_sensor_label{host="$host"}
                      legendFormat: "{{chip_name}}/{{label}}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: watt
                custom:
                  lineWidth: 2
              overrides: []
  layout:
    kind: RowsLayout
    spec:
      rows:
        - kind: RowsLayoutRow
          spec:
            title: Temperature
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 12
                      height: 8
                      element:
                        kind: ElementReference
                        name: temperature
        - kind: RowsLayoutRow
          spec:
            title: Power
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 12
                      height: 8
                      element:
                        kind: ElementReference
                        name: input-voltage
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 0
                      width: 12
                      height: 8
                      element:
                        kind: ElementReference
                        name: power-consumption
  links:
    - title: Back to Linux fleet overview
      type: link
      icon: ""
      tooltip: ""
      path: fleet-overview.yaml
      tags: []
      asDropdown: false
      targetBlank: false
      includeVars: false
      keepTime: true
    - title: Back to Linux host overview
      type: link
      icon: ""
      tooltip: ""
      path: host-overview.yaml
      tags: []
      asDropdown: false
      targetBlank: false
      includeVars: false
      keepTime: true
    - title: All Linux dashboards
      type: dashboards
      icon: ""
      tooltip: ""
      tags:
        - linux
      asDropdown: true
      targetBlank: false
      includeVars: true
      keepTime: true
    - title: All docker dashboards
      type: dashboards
      icon: ""
      tooltip: ""
      tags:
        - docker
      asDropdown: true
      targetBlank: false
      includeVars: true
      keepTime: true
  liveNow: false
  preload: false
  tags:
    - linux
  timeSettings:
    timezone: browser
    from: now-1h
    to: now
    autoRefresh: 30s
    autoRefreshIntervals:
      - 15s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
    hideTimepicker: false
    fiscalYearStartMonth: 0
  title: Hardware monitor
  variables:
    - kind: DatasourceVariable
      spec:
        name: datasource
        pluginId: prometheus
        refresh: never
        regex: ""
        current:
          text: ""
          value: ""
        options: []
        multi: false
        includeAll: false
        label: Data source
        hide: inControlsMenu
        skipUrlSync: false
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: host
        current:
          text: sun
          value: sun
        label: Host
        hide: dontHide
        refresh: onDashboardLoad
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: label_values(node_uname_info, host)
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: false
        includeAll: false
        allowCustomValue: false
