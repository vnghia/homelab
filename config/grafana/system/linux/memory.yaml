apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    memory-usage-percent:
      kind: Panel
      spec:
        id: 1
        title: Memory usage
        description: RAM (random-access memory) currently in use by the operating system and running applications, in percent.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        100 -
                        (
                          avg by (instance) (node_memory_memavailable_bytes{host="$host"}) /
                          avg by (instance) (node_memory_memtotal_bytes{host="$host"})
                        * 100
                        )
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              reduceOptions:
                calcs:
                  - lastNotNull
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                color:
                  mode: continuous-BlYlRd
                  fixedColor: text
              overrides: []
    memory-usage:
      kind: Panel
      spec:
        id: 2
        title: Memory usage
        description: |
          - Used: The amount of physical memory currently in use by the system.
          - Cached: The amount of physical memory used for caching data from disk. The Linux kernel uses available memory to cache data that is read from or written to disk. This helps speed up disk access times.
          - Free: The amount of physical memory that is currently not in use.
          - Buffers: The amount of physical memory used for temporary storage of data being transferred between devices or applications.
          - Available: The amount of physical memory that is available for use by applications. This takes into account memory that is currently being used for caching but can be freed up if needed.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        (
                          node_memory_memtotal_bytes{host="$host"}
                        -
                          node_memory_memfree_bytes{host="$host"}
                        -
                          node_memory_buffers_bytes{host="$host"}
                        -
                          node_memory_cached_bytes{host="$host"}
                        )
                      legendFormat: Memory used
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_cached_bytes{host="$host"}
                      legendFormat: Memory cached
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_memavailable_bytes{host="$host"}
                      legendFormat: Memory available
                  refId: C
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_buffers_bytes{host="$host"}
                      legendFormat: Memory buffers
                  refId: D
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_memfree_bytes{host="$host"}
                      legendFormat: Memory free
                  refId: E
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_memtotal_bytes{host="$host"}
                      legendFormat: Memory total
                  refId: F
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
                - __systemRef: hideSeriesFrom
                  matcher:
                    id: byNames
                    options:
                      mode: exclude
                      names:
                        - Memory total
                        - Memory used
                      prefix: "All except:"
                      readOnly: true
                  properties:
                    - id: custom.hideFrom
                      value:
                        legend: false
                        tooltip: true
                        viz: true
    memory-pages-in-out:
      kind: Panel
      spec:
        id: 3
        title: Memory pages in / out
        description: |
          Page-In - Return of pages to physical memory. This is a common and normal event.
          Page-Out - process of writing pages to disk. Unlike page-in, page-outs can indicate trouble.
          When the kernel detects low memory, it attempts to free memory by paging out. 
          While occasional page-outs are normal, excessive and frequent page-outs can lead to thrashing.
          Thrashing is a state in which the kernel spends more time managing paging activity than running applications, resulting in poor system performance.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_vmstat_pgpgin{host="$host"}[$__rate_interval])
                      legendFormat: Page-In
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_vmstat_pgpgout{host="$host"}[$__rate_interval])
                      legendFormat: Page-Out
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    memory-pages-swapping-in-out:
      kind: Panel
      spec:
        id: 4
        title: Memory pages swapping in / out
        description: |
          Compared to the speed of the CPU and main memory, writing pages out to disk is relatively slow.
          Nonetheless, it is a preferable option to crashing or killing off processes.
          The process of writing pages out to disk to free memory is known as swapping-out.
          If a page fault occurs because the page is on disk, in the swap area, rather than in memory,
          the kernel will read the page back in from the disk to satisfy the page fault. 
          This is known as swapping-in.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_vmstat_pswpin{host="$host"}[$__rate_interval])
                      legendFormat: Pages swapped in
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_vmstat_pswpout{host="$host"}[$__rate_interval])
                      legendFormat: Pages swapped out
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                custom:
                  axisCenteredZero: false
                  axisLabel: out(-) | in(+)
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: /transmit|tx|out/
                  properties:
                    - id: custom.transform
                      value: negative-Y
    memory-page-faults:
      kind: Panel
      spec:
        id: 5
        title: Memory page faults
        description: |
          A page fault is an exception raised by the memory when a process accesses a memory page without the necessary preparations,
          requiring a mapping to be added to the process's virtual address space.
          The page contents may also need to be loaded from a backing store such as a disk.
          While the MMU detects the page fault, the operating system's kernel handles the exception by either making the required page accessible in physical memory or denying an illegal memory access.
          Valid page faults are common and necessary to increase memory availability in any operating system that uses virtual memory, including Windows, macOS, and the Linux kernel.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_vmstat_pgmajfault{host="$host"}[$__rate_interval])
                      legendFormat: Major page fault operations
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >
                        irate(node_vmstat_pgfault{host="$host"}[$__rate_interval])
                        -
                        irate(node_vmstat_pgmajfault{host="$host"}[$__rate_interval])
                      legendFormat: Minor page fault operations
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides: []
    oom-killer:
      kind: Panel
      spec:
        id: 6
        title: OOM Killer
        description: |
          Out Of Memory killer is a process used by the Linux kernel when the system is running critically low on memory.
          This can happen when the kernel has allocated more memory than is available for its processes.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: increase(node_vmstat_oom_kill{host="$host"}[$__interval:]offset - $__interval)
                      legendFormat: OOM killer invocations
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides: []
    memory-active-inactive:
      kind: Panel
      spec:
        id: 7
        title: Memory active / inactive
        description: |
          - Inactive: Memory which has been less recently used. It is more eligible to be reclaimed for other purposes.
          - Active: Memory that has been used more recently and usually not reclaimed unless absolutely necessary.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_active_bytes{host="$host"}
                      legendFormat: Active
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_inactive_bytes{host="$host"}
                      legendFormat: Inactive
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    memory-active-inactive-details:
      kind: Panel
      spec:
        id: 8
        title: Memory active / inactive details
        description: |
          - Inactive_file: File-backed memory on inactive LRU list.
          - Inactive_anon: Anonymous and swap cache on inactive LRU list, including tmpfs (shmem).
          - Active_file: File-backed memory on active LRU list.
          - Active_anon: Anonymous and swap cache on active least-recently-used (LRU) list, including tmpfs.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_inactive_file_bytes{host="$host"}
                      legendFormat: Inactive_file
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_inactive_anon_bytes{host="$host"}
                      legendFormat: Inactive_anon
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_active_file_bytes{host="$host"}
                      legendFormat: Active_file
                  refId: C
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_active_anon_bytes{host="$host"}
                      legendFormat: Active_anon
                  refId: D
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    memory-committed:
      kind: Panel
      spec:
        id: 9
        title: Memory commited
        description: |
          - Committed_AS - Amount of memory presently allocated on the system.
          - CommitLimit - Amount of memory currently available to be allocated on the system.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_committed_as_bytes{host="$host"}
                      legendFormat: Commited_AS
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_commitlimit_bytes{host="$host"}
                      legendFormat: CommitLimit
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    memory-shared-and-mapped:
      kind: Panel
      spec:
        id: 10
        title: Memory shared and mapped
        description: |
          - Mapped: This refers to the memory used in mapped page files that have been memory mapped, such as libraries.
          - Shmem: This is the memory used by shared memory, which is shared between multiple processes, including RAM disks.
          - ShmemHugePages: This is the memory used by shared memory and tmpfs allocated with huge pages.
          - ShmemPmdMapped: This is the amount of shared memory (shmem/tmpfs) backed by huge pages.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_mapped_bytes{host="$host"}
                      legendFormat: Mapped
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_shmem_bytes{host="$host"}
                      legendFormat: Shmem
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_shmempmdmapped_bytes{host="$host"}
                      legendFormat: ShmemPmdMapped
                  refId: C
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_shmemhugepages_bytes{host="$host"}
                      legendFormat: ShmemHugePages
                  refId: D
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    memory-writeback-and-dirty:
      kind: Panel
      spec:
        id: 11
        title: Memory writeback and dirty
        description: |
          - Writeback: This refers to the memory that is currently being actively written back to the disk.
          - WritebackTmp: This is the memory used by FUSE for temporary writeback buffers.
          - Dirty: This type of memory is waiting to be written back to the disk.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_writeback_bytes{host="$host"}
                      legendFormat: Writeback
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_writebacktmp_bytes{host="$host"}
                      legendFormat: WritebackTmp
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_dirty_bytes{host="$host"}
                      legendFormat: Dirty
                  refId: C
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
              tooltip:
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: bytes
                min: 0
                custom:
                  fillOpacity: 30
                  gradientMode: opacity
                  lineInterpolation: smooth
                  lineWidth: 2
                  showPoints: never
              overrides:
                - matcher:
                    id: byRegexp
                    options: ".*(T|t)otal.*"
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    memory-vmalloc:
      kind: Panel
      spec:
        id: 12
        title: Memory Vmalloc
        description: |
          Virtual Memory Allocation is a type of memory allocation in Linux that allows a process to request a contiguous block of memory larger than the amount of physically available memory. This is achieved by mapping the requested memory to virtual addresses that are backed by a combination of physical memory and swap space on disk.

          - VmallocChunk: Largest contiguous block of vmalloc area which is free.
          - VmallocTotal: Total size of vmalloc memory area.
          - VmallocUsed: Amount of vmalloc area which is used.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_vmallocchunk_bytes{host="$host"}
                      legendFormat: VmallocChunk
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_vmalloctotal_bytes{host="$host"}
                      legendFormat: VmallocTotal
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_memory_vmallocused_bytes{host="$host"}
                      legendFormat: VmallocUsed
                  refId: C
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
