apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    cpu-usage-percent:
      kind: Panel
      spec:
        id: 1
        title: CPU usage
        description: |
          Total CPU utilization percent is a metric that indicates the overall level of central processing unit (CPU) usage in a computer system.
          It represents the combined load placed on all CPU cores or processors.

          For instance, if the total CPU utilization percent is 50%, it means that,
          on average, half of the CPU's processing capacity is being used to execute tasks. A higher percentage indicates that the CPU is working more intensively, potentially leading to system slowdowns if it remains consistently high.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        (((count by (host) (count(node_cpu_seconds_total{host="$host"}) by (cpu, host)))
                        -
                        sum by (host) (sum by (host, mode) (irate(node_cpu_seconds_total{host="$host", mode=~"idle|iowait|steal"}[$__rate_interval])))) * 100)
                        /
                        (count by (host) (count(node_cpu_seconds_total{host="$host"}) by (cpu, host)))
                      legendFormat: CPU usage
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: continuous-BlYlRd
                  fixedColor: text
              overrides: []
    per-cpu-usage-percent:
      kind: Panel
      spec:
        id: 2
        title: CPU usage
        description: |
          Total CPU utilization percent is a metric that indicates the overall level of central processing unit (CPU) usage in a computer system.
          It represents the combined load placed on all CPU cores or processors.

          For instance, if the total CPU utilization percent is 50%, it means that,
          on average, half of the CPU's processing capacity is being used to execute tasks. A higher percentage indicates that the CPU is working more intensively, potentially leading to system slowdowns if it remains consistently high.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: (100 - sum without (mode) (rate(node_cpu_seconds_total{host="$host", mode=~"idle|iowait|steal"}[$__rate_interval])) * 100)
                      legendFormat: "CPU {{cpu}}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: percent
                decimals: 1
                min: 0
                max: 100
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: continuous-BlYlRd
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: scheme
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    cpu-usage-by-mode:
      kind: Panel
      spec:
        id: 3
        title: CPU usage by modes
        description: |
          - System: Processes executing in kernel mode.
          - User: Normal processes executing in user mode.
          - Nice: Niced processes executing in user mode.
          - Idle: Waiting for something to happen.
          - Iowait: Waiting for I/O to complete.
          - Irq: Servicing interrupts.
          - Softirq: Servicing softirqs.
          - Steal: Time spent in other operating systems when running in a virtualized environment.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        sum by(host, mode) (irate(node_cpu_seconds_total{host="$host"}[$__rate_interval]))
                        / on(host) group_left
                        sum by (host) (irate(node_cpu_seconds_total{host="$host"}[$__rate_interval]))
                        * 100
                      legendFormat: "{{ mode }}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: percent
                min: 0
                max: 100
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 80
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byName
                    options: idle
                  properties:
                    - id: color
                      value:
                        fixedColor: light-blue
                        mode: fixed
                - matcher:
                    id: byName
                    options: interrupt
                  properties:
                    - id: color
                      value:
                        fixedColor: light-purple
                        mode: fixed
                - matcher:
                    id: byName
                    options: user
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                - matcher:
                    id: byRegexp
                    options: system|privileged
                  properties:
                    - id: color
                      value:
                        fixedColor: light-red
                        mode: fixed
    load-average:
      kind: Panel
      spec:
        id: 4
        title: Load average
        description: |
          System load average over the previous 1, 5, and 15 minute ranges.

          A measurement of how many processes are waiting for CPU cycles. The maximum number is the number of CPU cores for the node.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_load1{host="$host"}
                      legendFormat: 1m
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_load5{host="$host"}
                      legendFormat: 5m
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_load15{host="$host"}
                      legendFormat: 15m
                  refId: C
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: count without (cpu) (node_cpu_seconds_total{host="$host", mode="idle"})
                      legendFormat: Cores
                  refId: D
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                min: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 0
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byRegexp
                    options: Cores
                  properties:
                    - id: color
                      value:
                        fixedColor: light-orange
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
                    - id: custom.lineStyle
                      value:
                        dash:
                          - 10
                          - 10
                        fill: dash
    context-switches:
      kind: Panel
      spec:
        id: 5
        title: Context switches/Interrupts
        description: |
          Context switches occur when the operating system switches from running one process to another. Interrupts are signals sent to the CPU by external devices to request its attention.

          A high number of context switches or interrupts can indicate that the system is overloaded or that there are problems with specific devices or processes.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_context_switches_total{host="$host"}[$__rate_interval])
                      legendFormat: Context switches
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: irate(node_intr_total{host="$host"}[$__rate_interval])
                      legendFormat: Interrupts
                  refId: B
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    timezone:
      kind: Panel
      spec:
        id: 6
        title: Timezone
        description: Current system timezone.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_time_zone_offset_seconds{host="$host"}
                      format: table
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: fixed
              graphMode: none
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: /^time_zone$/
                values: false
              showPercentChange: false
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: fixed
                  fixedColor: text
              overrides: []
    ntp-status:
      kind: Panel
      spec:
        id: 7
        title: NTP status
        description: Status of time synchronization.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_timex_sync_status{host="$host"}
                      legendFormat: NTP status
                  refId: A
                  hidden: false
            transformations: []
            queryOptions:
              maxDataPoints: 50
        vizConfig:
          kind: VizConfig
          group: status-history
          version: ""
          spec:
            options:
              colWidth: 0.9
              legend: false
              rowHeight: 0.9
              showValue: auto
              tooltip:
                hideZeros: false
                mode: single
                sort: none
            fieldConfig:
              defaults:
                mappings:
                  - type: value
                    options:
                      "0":
                        text: Not in sync
                        color: light-yellow
                        index: 1
                      "1":
                        text: In sync
                        color: light-green
                        index: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: fixed
                noValue: No data.
                custom:
                  axisPlacement: auto
                  fillOpacity: 70
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  lineWidth: 1
              overrides: []
    time-drift:
      kind: Panel
      spec:
        id: 8
        title: Time synchronized drift
        description: |
          Time synchronization is essential to ensure accurate timekeeping, which is critical for many system operations such as logging, authentication, and network communication, as well as distributed systems or clusters where data consistency is important.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_timex_estimated_error_seconds{host="$host"}
                      legendFormat: Estimated error in seconds
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_timex_offset_seconds{host="$host"}
                      legendFormat: Time offset
                  refId: B
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: node_timex_maxerror_seconds{host="$host"}
                      legendFormat: Maximum error in seconds
                  refId: C
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs: []
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: s
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                noValue: No data.
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 30
                  gradientMode: opacity
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 2
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
  layout:
    kind: RowsLayout
    spec:
      rows:
        - kind: RowsLayoutRow
          spec:
            title: System
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 6
                      height: 6
                      element:
                        kind: ElementReference
                        name: cpu-usage-percent
                  - kind: GridLayoutItem
                    spec:
                      x: 6
                      y: 0
                      width: 9
                      height: 6
                      element:
                        kind: ElementReference
                        name: per-cpu-usage-percent
                  - kind: GridLayoutItem
                    spec:
                      x: 15
                      y: 0
                      width: 9
                      height: 6
                      element:
                        kind: ElementReference
                        name: cpu-usage-by-mode
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 6
                      width: 12
                      height: 7
                      element:
                        kind: ElementReference
                        name: load-average
                  - kind: GridLayoutItem
                    spec:
                      x: 12
                      y: 6
                      width: 12
                      height: 7
                      element:
                        kind: ElementReference
                        name: context-switches
        - kind: RowsLayoutRow
          spec:
            title: Time
            collapse: false
            layout:
              kind: GridLayout
              spec:
                items:
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 0
                      width: 3
                      height: 4
                      element:
                        kind: ElementReference
                        name: timezone
                  - kind: GridLayoutItem
                    spec:
                      x: 3
                      y: 0
                      width: 21
                      height: 4
                      element:
                        kind: ElementReference
                        name: ntp-status
                  - kind: GridLayoutItem
                    spec:
                      x: 0
                      y: 4
                      width: 24
                      height: 7
                      element:
                        kind: ElementReference
                        name: time-drift
  links:
    - title: Back to Linux fleet overview
      type: link
      icon: ""
      tooltip: ""
      path: fleet-overview.yaml
      tags: []
      asDropdown: false
      targetBlank: false
      includeVars: false
      keepTime: true
    - title: Back to Linux node overview
      type: link
      icon: ""
      tooltip: ""
      path: node-overview.yaml
      tags: []
      asDropdown: false
      targetBlank: false
      includeVars: false
      keepTime: true
    - title: All Linux dashboards
      type: dashboards
      icon: ""
      tooltip: ""
      tags:
        - linux
      asDropdown: true
      targetBlank: false
      includeVars: true
      keepTime: true
  liveNow: false
  preload: false
  tags:
    - linux
  timeSettings:
    timezone: browser
    from: now-1h
    to: now
    autoRefresh: 30s
    autoRefreshIntervals:
      - 15s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
    hideTimepicker: false
    fiscalYearStartMonth: 0
  title: CPU and system
  variables:
    - kind: DatasourceVariable
      spec:
        name: datasource
        pluginId: prometheus
        refresh: never
        regex: ""
        current:
          text: ""
          value: ""
        options: []
        multi: false
        includeAll: false
        label: Data source
        hide: inControlsMenu
        skipUrlSync: false
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: host
        current:
          text: sun
          value: sun
        label: Host
        hide: dontHide
        refresh: onDashboardLoad
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: "label_values(node_uname_info, host)"
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: false
        includeAll: false
        allowCustomValue: false
