apiVersion: dashboard.grafana.app/v2
kind: Dashboard
spec:
  annotations:
    - kind: AnnotationQuery
      spec:
        query:
          kind: DataQuery
          group: grafana
          version: v0
          datasource:
            name: "-- Grafana --"
          spec: {}
        enable: true
        hide: true
        iconColor: "rgba(0, 211, 255, 1)"
        name: Annotations & Alerts
        builtIn: true
  cursorSync: "Off"
  editable: false
  elements:
    load:
      kind: Panel
      spec:
        id: 1
        title: Load
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: datasource
                    version: v0
                    datasource:
                      name: "-- Dashboard --"
                    spec:
                      panelId: 4
                  refId: A
                  hidden: false
            transformations:
              - kind: Transformation
                group: filterFieldsByName
                spec:
                  options:
                    include:
                      pattern: Total
              - kind: Transformation
                group: reduce
                spec:
                  options:
                    includeTimeField: false
                    mode: seriesToRows
                    reducers:
                      - mean
                      - sum
              - kind: Transformation
                group: organize
                spec:
                  options:
                    excludeByName: {}
                    indexByName: {}
                    renameByName:
                      Mean: Average load
                      Total: Total
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: area
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - lastNotNull
                fields: ""
                values: false
              showPercentChange: false
              text: {}
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: short
                mappings:
                  - type: special
                    options:
                      match: "null"
                      result:
                        text: N/A
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                color:
                  mode: fixed
                  fixedColor: purple
              overrides: []
    average-response-time:
      kind: Panel
      spec:
        id: 2
        title: Average response time
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        sum(increase(traefik_service_request_duration_seconds_sum{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval))
                        /
                        sum(increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval))
                      format: time_series
                      instant: false
                      legendFormat: Average response time
                      range: true
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: none
              justifyMode: auto
              orientation: horizontal
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - mean
                fields: ""
                values: false
              showPercentChange: false
              text: {}
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: s
                mappings:
                  - type: special
                    options:
                      match: "null"
                      result:
                        text: N/A
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: fixed
                  fixedColor: "rgb(31, 120, 193)"
              overrides: []
    errors:
      kind: Panel
      spec:
        id: 3
        title: Errors
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum(increase(traefik_service_requests_total{service_namespace="$namespace", protocol="http", service=~"$service", code=~"^[45]\\d{2}"}[$agg_interval] offset - $agg_interval))
                      format: time_series
                      instant: false
                      legendFormat: Errors
                      range: true
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum(increase(traefik_service_requests_total{service_namespace="$namespace", service=~"$service"}[$agg_interval] offset - $agg_interval))
                      format: time_series
                      instant: false
                      legendFormat: Total
                      range: true
                  refId: B
                  hidden: false
            transformations:
              - kind: Transformation
                group: calculateField
                spec:
                  options:
                    alias: Rate
                    binary:
                      left: Errors
                      operator: /
                      reducer: sum
                      right: Total
                    mode: binary
                    reduce:
                      include: []
                      reducer: sum
              - kind: Transformation
                group: organize
                spec:
                  options:
                    excludeByName:
                      Total: true
                    indexByName: {}
                    renameByName:
                      Errors: Total
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: stat
          version: ""
          spec:
            options:
              colorMode: value
              graphMode: none
              justifyMode: auto
              orientation: auto
              percentChangeColorMode: standard
              reduceOptions:
                calcs:
                  - sum
                fields: ""
                values: false
              showPercentChange: false
              text: {}
              textMode: auto
              wideLayout: true
            fieldConfig:
              defaults:
                unit: percent
                mappings:
                  - type: special
                    options:
                      match: "null"
                      result:
                        text: N/A
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: fixed
                  fixedColor: red
              overrides:
                - matcher:
                    id: byName
                    options: Total
                  properties:
                    - id: unit
                      value: short
                    - id: decimals
                      value: 0
    load-by-service:
      kind: Panel
      spec:
        id: 4
        title: Load / $agg_interval
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum by (service) (increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{service}}"
                      range: true
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum by () (increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: Total
                      range: true
                  refId: B
                  hidden: false
            transformations: []
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - min
                  - sum
                displayMode: list
                placement: bottom
                showLegend: true
                sortBy: Total
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                decimals: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: -1
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 7
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byName
                    options: Total
                  properties:
                    - id: custom.drawStyle
                      value: line
                    - id: custom.fillOpacity
                      value: 0
                    - id: color
                      value:
                        fixedColor: "#b877d9"
                        mode: fixed
                    - id: custom.stacking
                      value:
                        group: A
                        mode: none
    average-response-time-by-service:
      kind: Panel
      spec:
        id: 5
        title: Average response time
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: >-
                        sum by (service) (increase(traefik_service_request_duration_seconds_sum{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                        /
                        sum by (service) (increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: __auto
                      range: true
                  refId: A
                  hidden: false
            transformations: []
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - min
                  - lastNotNull
                displayMode: list
                placement: bottom
                showLegend: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: s
                decimals: 2
                mappings:
                  - type: special
                    options:
                      match: "null"
                      result:
                        text: N/A
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                  fixedColor: "rgb(31, 120, 193)"
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 0
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 5
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    errors-rate:
      kind: Panel
      spec:
        id: 6
        title: Errors rate
        description: Ratio of 4xx and 5xx HTTP responses to all calls.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |
                        sum by (service) (increase(traefik_service_requests_total{service_namespace="$namespace", protocol="http", service=~"$service", code=~"^[45]\\d{2}"}[$agg_interval] offset - $agg_interval))
                        /
                        sum by (service) (increase(traefik_service_requests_total{service_namespace="$namespace", service=~"$service"}[$agg_interval] offset - $agg_interval) > 0)
                        * 100
                      format: time_series
                      instant: false
                      legendFormat: "{{ service }}"
                      range: true
                  refId: A
                  hidden: false
            transformations: []
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - min
                  - lastNotNull
                displayMode: list
                placement: bottom
                showLegend: true
                sortBy: Total
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: percent
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: -1
                  barWidthFactor: 0.6
                  drawStyle: line
                  fillOpacity: 14
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: smooth
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: none
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    load-by-http-codes:
      kind: Panel
      spec:
        id: 7
        title: Load by HTTP codes/$agg_interval
        description: "Load distribution by method, code over $agg_interval"
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: |-
                        sum by (code) (label_replace((increase(traefik_service_requests_total{service_namespace="$namespace", protocol="http", service=~"$service"}[$agg_interval] offset - $agg_interval )) > 0,
                          "code", "HTTP ${1}00-${1}99", "code", "^([0-9]).+"
                        ))
                      format: time_series
                      instant: false
                      legendFormat: "{{alias}}"
                      range: true
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum by () (increase(traefik_service_requests_total{service_namespace="$namespace", protocol="http", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: Total
                      range: true
                  refId: B
                  hidden: false
            transformations:
              - group: seriesToRows
                kind: Transformation
                spec:
                  filter:
                    id: byRefId
                    options: A
                  options: {}
              - group: groupBy
                kind: Transformation
                spec:
                  filter:
                    id: byRefId
                    options: /^(?:seriesToRows-A.*)$/
                  options:
                    fields:
                      Metric:
                        aggregations: []
                        operation: groupby
                      Time:
                        aggregations: []
                        operation: groupby
                      Value:
                        aggregations:
                          - sum
                        operation: aggregate
              - group: prepareTimeSeries
                kind: Transformation
                spec:
                  filter:
                    id: byRefId
                    options: /^(?:seriesToRows-A.*)$/
                  options:
                    format: multi
              - group: renameByRegex
                kind: Transformation
                spec:
                  options:
                    regex: Value \(sum\) (.+)
                    renamePattern: $1
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - min
                  - sum
                displayMode: table
                placement: right
                showLegend: true
                sortBy: Total
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                decimals: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 1
                  barWidthFactor: 0.6
                  drawStyle: bars
                  fillOpacity: 100
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byName
                    options: Total
                  properties:
                    - id: custom.drawStyle
                      value: line
                    - id: custom.fillOpacity
                      value: 0
                    - id: color
                      value:
                        fixedColor: "#b877d9"
                        mode: fixed
                    - id: custom.stacking
                      value:
                        group: A
                        mode: none
                - matcher:
                    id: byName
                    options: HTTP 100-199
                  properties:
                    - id: color
                      value:
                        fixedColor: purple
                        mode: fixed
                - matcher:
                    id: byName
                    options: HTTP 200-299
                  properties:
                    - id: color
                      value:
                        fixedColor: green
                        mode: fixed
                - matcher:
                    id: byName
                    options: HTTP 300-399
                  properties:
                    - id: color
                      value:
                        fixedColor: blue
                        mode: fixed
                - matcher:
                    id: byName
                    options: HTTP 400-499
                  properties:
                    - id: color
                      value:
                        fixedColor: orange
                        mode: fixed
                - matcher:
                    id: byName
                    options: HTTP 500-599
                  properties:
                    - id: color
                      value:
                        fixedColor: red
                        mode: fixed
    load-by-method:
      kind: Panel
      spec:
        id: 8
        title: Load by method/$agg_interval
        description: "Load distribution by method, code over $agg_interval"
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
