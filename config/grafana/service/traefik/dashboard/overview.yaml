                      name: ${datasource}
                    spec:
                      expr: sum by (method) (increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service", code!=""}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{alias}}"
                      range: true
                  refId: A
                  hidden: false
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum by () (increase(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol", service=~"$service"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: Total
                      range: true
                  refId: B
                  hidden: false
            transformations: []
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - mean
                  - max
                  - min
                  - sum
                displayMode: table
                placement: right
                showLegend: true
                sortBy: Total
                sortDesc: true
              tooltip:
                hideZeros: false
                mode: multi
                sort: desc
            fieldConfig:
              defaults:
                unit: short
                decimals: 0
                thresholds:
                  mode: absolute
                  steps:
                    - value: 0
                      color: green
                    - value: 80
                      color: red
                color:
                  mode: palette-classic
                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 1
                  barWidthFactor: 0.6
                  drawStyle: bars
                  fillOpacity: 100
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
                  thresholdsStyle:
                    mode: "off"
              overrides:
                - matcher:
                    id: byName
                    options: Total
                  properties:
                    - id: custom.drawStyle
                      value: line
                    - id: custom.stacking
                      value:
                        group: A
                        mode: none
                    - id: color
                      value:
                        fixedColor: purple
                        mode: fixed
                    - id: custom.fillOpacity
                      value: 0
    status-code-2xx:
      kind: Panel
      spec:
        id: 9
        title: Status codes 2xx/$agg_interval
        description: ""
