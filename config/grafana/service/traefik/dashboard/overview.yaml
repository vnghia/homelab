                custom:
                  axisBorderShow: false
                  axisCenteredZero: false
                  axisColorMode: text
                  axisLabel: ""
                  axisPlacement: auto
                  barAlignment: 1
                  barWidthFactor: 0.6
                  drawStyle: bars
                  fillOpacity: 100
                  gradientMode: none
                  hideFrom:
                    legend: false
                    tooltip: false
                    viz: false
                  insertNulls: false
                  lineInterpolation: linear
                  lineWidth: 1
                  pointSize: 5
                  scaleDistribution:
                    type: linear
                  showPoints: never
                  showValues: false
                  spanNulls: false
                  stacking:
                    group: A
                    mode: normal
                  thresholdsStyle:
                    mode: "off"
              overrides: []
    other-status-codes:
      kind: Panel
      spec:
        id: 10
        title: Others status codes/$agg_interval
        description: ""
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: prometheus
                    version: v0
                    datasource:
                      name: ${datasource}
                    spec:
                      expr: sum by (method, code) (increase(traefik_entrypoint_requests_total{service_namespace="$namespace", entrypoint=~"$entrypoint", protocol=~"$protocol", code!~"^2\\d{2}"}[$agg_interval] offset - $agg_interval)) > 0
                      format: time_series
                      instant: false
                      legendFormat: "{{ method }} : {{code}}"
                      range: true
                  refId: A
                  hidden: false
            transformations: []
            queryOptions:
              interval: $agg_interval
        vizConfig:
          kind: VizConfig
          group: timeseries
          version: ""
          spec:
            options:
              legend:
                calcs:
                  - lastNotNull
                  - max
                  - min
                  - mean
                  - sum
                displayMode: table
