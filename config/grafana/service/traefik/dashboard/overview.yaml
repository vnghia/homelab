  links: []
  liveNow: false
  preload: false
  tags:
    - traefik
  timeSettings:
    timezone: browser
    from: now-1h
    to: now
    autoRefresh: 30s
    autoRefreshIntervals:
      - 15s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
    hideTimepicker: false
    fiscalYearStartMonth: 0
  title: Overview
  variables:
    - kind: DatasourceVariable
      spec:
        name: datasource
        pluginId: prometheus
        refresh: never
        regex: ""
        current:
          text: ""
          value: ""
        options: []
        multi: false
        includeAll: false
        label: Data source
        hide: inControlsMenu
        skipUrlSync: false
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: namespace
        current:
          text: sun
          value: sun
        label: Namespace
        hide: dontHide
        refresh: onDashboardLoad
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: "label_values(traefik_open_connections, service_namespace)"
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: false
        includeAll: false
        allowCustomValue: false
    - kind: QueryVariable
      spec:
        name: entrypoint
        current:
          text: All
          value: $__all
        label: Entrypoint
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: 'label_values(traefik_open_connections{service_namespace="$namespace"}, entrypoint)'
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: ".+"
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: protocol
        current:
          text: All
          value: $__all
        label: Protocol
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: 'label_values(traefik_entrypoint_requests_total{service_namespace="$namespace", entrypoint=~"$entrypoint"}, protocol)'
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: ".+"
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: service
        current:
          text: All
          value: $__all
        label: Service
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${datasource}
          spec:
            __legacyStringValue: 'label_values(traefik_service_requests_total{service_namespace="$namespace", protocol=~"$protocol"}, service)'
        regex: ""
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: ".+"
        allowCustomValue: true
        staticOptions:
          - selected: false
            text: no-service
            value: no-service
        staticOptionsOrder: after
    - kind: IntervalVariable
      spec:
        name: agg_interval
        query: "30s,1m,5m,10m,1h,1d"
        current:
          text: auto
          value: $__auto_interval_agg_interval
        options:
          - selected: true
            text: auto
            value: $__auto_interval_agg_interval
          - selected: false
            text: 30s
            value: 30s
          - selected: false
            text: 1m
            value: 1m
          - selected: false
            text: 5m
            value: 5m
          - selected: false
            text: 10m
            value: 10m
          - selected: false
            text: 1h
            value: 1h
          - selected: false
            text: 1d
            value: 1d
        auto: true
        auto_min: 1m
        auto_count: 100
        refresh: onTimeRangeChanged
        label: Aggregation interval
        hide: dontHide
        skipUrlSync: false
        description: Desired group interval
