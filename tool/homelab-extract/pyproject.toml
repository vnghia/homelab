[project]
name = "homelab-extract"
version = "0.1.0"
authors = [{ name = "Vo Van Nghia", email = "git@vnghia.com" }]
requires-python = ">=3.14.4"
dependencies = [
    "homelab-s3",
    "homelab-pydantic",
    "homelab-mail",
    "pydantic>=2.10.6",
    "pulumi>=3.207.0",
]

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[tool.ruff]
extend = "../../pyproject.toml"
