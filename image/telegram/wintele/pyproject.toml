[project]
name = "homelab-wintele-docker"
version = "0.1.0"
requires-python = ">=3.14.2"
dependencies = [
    "docker[ssh]>=7.1.0",
    "cffi>=2.0.0",
    "pyotp>=2.9.0",
    "pyrate-limiter>=3.7.1",
    "python-json-logger>=3.3.0",
    "python-telegram-bot[webhooks]>=22.2",
]

[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project.scripts]
homelab-wintele = "homelab_wintele_docker:main"
