[project]
name = "homelab-hatchet-tool"
version = "0.1.0"
authors = [{ name = "Vo Van Nghia", email = "git@vnghia.com" }]
requires-python = ">=3.13.1"
dependencies = [
    "aiodocker>=0.26.0",
    "aiofiles>=25.1.0",
    "homelab-pydantic",
