name: homelab
description: My homelab IaC configuration
runtime:
  name: python
  options:
    toolchain: uv
    virtualenv: .venv
    typechecker: mypy
config:
  pulumi:tags:
    value:
      pulumi:template: python
  pulumi:disable-default-providers:
    value:
      - docker
      - docker-build
packages:
  b2:
    source: terraform-provider
    version: 1.1.0
    parameters:
      - backblaze/b2
